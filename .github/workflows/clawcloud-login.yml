# 文件名: .github/workflows/clawcloud-login.yml
name: ClawCloud Run Auto Login (2FA Support)

on:
  schedule:
    - cron: '0 11 */8 * *'
  workflow_dispatch:

jobs:
  auto-login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb curl

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp playwright-stealth
          playwright install chromium
          # 【极其关键的新增代码】让 Playwright 自动把 Ubuntu 服务器缺失的图形界面底层依赖全装上！
          playwright install-deps chromium

      - name: Run Login Script
        id: run_login
        continue-on-error: true
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PASSWORD: ${{ secrets.GH_PASSWORD }}
          GH_2FA_SECRET: ${{ secrets.GH_2FA_SECRET }}
        # 带有 -u 参数，确保子进程输出不被屏蔽，实时打印日志
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python -u login_script.py

      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-debug-screenshots
          path: "*.png"

      - name: Notify Telegram Success
        if: always() && hashFiles('login_result.txt') != '' && hashFiles('06_final_result.png') != ''
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping notification."
            exit 0
          fi
          STATUS=$(grep '^STATUS=' login_result.txt | cut -d= -f2-)
          REASON=$(grep '^REASON=' login_result.txt | cut -d= -f2-)
          FINAL_URL=$(grep '^FINAL_URL=' login_result.txt | cut -d= -f2-)
          if [ "$STATUS" = "success" ]; then
            MESSAGE="✅ ClawCloud 自动登录成功%0A原因：$REASON%0A最终地址：$FINAL_URL"
          else
            MESSAGE="❌ ClawCloud 自动登录失败%0A失败原因：$REASON%0A最终地址：$FINAL_URL"
          fi
          curl -sS -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendPhoto" \
            -F chat_id="$TG_CHAT_ID" \
            -F photo=@06_final_result.png \
            -F caption="$MESSAGE"

      - name: Fail workflow if login failed
        if: always() && hashFiles('login_result.txt') != ''
        run: |
          STATUS=$(grep '^STATUS=' login_result.txt | cut -d= -f2-)
          if [ "$STATUS" != "success" ]; then
            echo "Login failed."
            exit 1
          fi
